<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        
        .item{
            display: flex;
            background-color: rgb(125, 10, 160);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 4px;
            width: 80px;
            height: 70px;
            border-radius: 10px;
            justify-content: center;
          
        }
    </style>
    <title>Aula05 - GRID CSS responsivo</title>
</head>
<body>
    <div class="grid">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>

    </div>

</body>
</html>
