<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA01 - JAVASCRIPT</title>
    
<body>
    
    <input type="text" id="teste">
    <button onclick="enviar()">Enviar</button>
    <div  id="resultado"></div>
</body>



<script>

    let nome = "Amanda";
    let idade= 16;
    let altura= 1.60;
    let estudando = true;

    document.write("<h1>"+nome+"</h1>");
    document.write("<br>");
    document.write("<h2>"+idade+"</h2>");
    document.write("<br>");
    document.write(altura);
    document.write("<br>");
    document.write(estudando);

    let teste = document.getElementById("teste");
    let areaTexto = document.getElementById("resultado")

    function enviar(){ 
        let mesagem = teste.value;
        //PEGAMOS O .value PARA VER O TEXTO 
        alert("Você digitou:"+ mesagem);
        areaTexto.innerHTML = "<h3>Voce digitou:" + mesagem + "</h3"
    }

</script>

</html>
